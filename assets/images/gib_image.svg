<svg viewBox="0 0 1024 880" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="880" fill="#f3ede4"/>

  <!-- terminal window -->
  <rect x="140" y="60" width="744" height="560" rx="28" fill="#26507e" stroke="#14232c" stroke-width="14"/>
  <line x1="140" y1="168" x2="884" y2="168" stroke="#14232c" stroke-width="10"/>
  <circle cx="212" cy="114" r="20" fill="#f05a3a"/>
  <circle cx="272" cy="114" r="20" fill="#fec94f"/>
  <circle cx="332" cy="114" r="20" fill="#64b477"/>

  <!-- git branch line the gibbon hangs from -->
  <line x1="220" y1="255" x2="810" y2="255" stroke="#14232c" stroke-width="12" stroke-linecap="round"/>
  <line x1="560" y1="255" x2="670" y2="360" stroke="#14232c" stroke-width="12" stroke-linecap="round"/>
  <circle cx="300" cy="255" r="17" fill="#f05a3a" stroke="#14232c" stroke-width="8"/>
  <circle cx="560" cy="255" r="17" fill="#fec94f" stroke="#14232c" stroke-width="8"/>
  <circle cx="750" cy="255" r="17" fill="#f05a3a" stroke="#14232c" stroke-width="8"/>
  <circle cx="670" cy="360" r="15" fill="#fec94f" stroke="#14232c" stroke-width="8"/>

  <!-- gibbon: free hanging arm (bends inward) -->
  <path d="M 350 445 C 315 465 288 490 278 525" fill="none" stroke="#14232c" stroke-width="38" stroke-linecap="round"/>
  <path d="M 350 445 C 315 465 288 490 278 525" fill="none" stroke="#e0954f" stroke-width="26" stroke-linecap="round"/>
  <circle cx="276" cy="530" r="18" fill="#e0954f" stroke="#14232c" stroke-width="8"/>

  <!-- gibbon: gripping arm -->
  <path d="M 400 395 C 400 350 400 295 400 255" fill="none" stroke="#14232c" stroke-width="38" stroke-linecap="round"/>
  <path d="M 400 395 C 400 350 400 295 400 255" fill="none" stroke="#e0954f" stroke-width="26" stroke-linecap="round"/>
  <circle cx="400" cy="255" r="18" fill="#e0954f" stroke="#14232c" stroke-width="8"/>

  <!-- legs -->
  <path d="M 372 550 C 360 568 352 580 349 592" fill="none" stroke="#14232c" stroke-width="38" stroke-linecap="round"/>
  <path d="M 372 550 C 360 568 352 580 349 592" fill="none" stroke="#e0954f" stroke-width="26" stroke-linecap="round"/>
  <circle cx="348" cy="594" r="16" fill="#e0954f" stroke="#14232c" stroke-width="8"/>

  <path d="M 432 550 C 444 568 452 580 455 592" fill="none" stroke="#14232c" stroke-width="38" stroke-linecap="round"/>
  <path d="M 432 550 C 444 568 452 580 455 592" fill="none" stroke="#e0954f" stroke-width="26" stroke-linecap="round"/>
  <circle cx="456" cy="594" r="16" fill="#e0954f" stroke="#14232c" stroke-width="8"/>

  <!-- body -->
  <ellipse cx="400" cy="475" rx="80" ry="100" fill="#e0954f" stroke="#14232c" stroke-width="14"/>
  <ellipse cx="400" cy="492" rx="40" ry="62" fill="#fec94f"/>

  <!-- ears -->
  <circle cx="335" cy="355" r="24" fill="#e0954f" stroke="#14232c" stroke-width="12"/>
  <circle cx="465" cy="355" r="24" fill="#e0954f" stroke="#14232c" stroke-width="12"/>

  <!-- head -->
  <circle cx="400" cy="368" r="65" fill="#e0954f" stroke="#14232c" stroke-width="14"/>
  <ellipse cx="400" cy="382" rx="40" ry="34" fill="#fdf3e4" stroke="#14232c" stroke-width="8"/>

  <!-- face -->
  <circle cx="384" cy="378" r="7" fill="#14232c"/>
  <circle cx="416" cy="378" r="7" fill="#14232c"/>
  <path d="M 389 400 Q 400 409 411 400" fill="none" stroke="#14232c" stroke-width="6" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="512" y="790" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="150" fill="#14232c" text-anchor="middle">gib</text>
</svg>
